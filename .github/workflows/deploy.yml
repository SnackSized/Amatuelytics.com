name: Deploy to One.com
on:
  push:
    branches:
      - main # Kører automatisk, hver gang du trykker på 'Push origin' i GitHub Desktop

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: FTP Deploy to One.com
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ssh.c4ew2s88y.service.one # Den nye, præcise host fra One.com
          port: 22 # Porten til sikker SFTP
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /httpdocs/ # Skulle den fejle på mappen, retter vi den bare til /www/ bagefter