name: Reveal Hidden Subdomain Paths

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LFTP
        run: sudo apt-get update && sudo apt-get install -y lftp

      # Vi beder lftp om at gå helt op i helikopteren og vise ALLE mapper,
      # også dem der ligger uden for den normale visning.
      - name: Audit Real Directory Tree
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -e "set sftp:connect-program 'ssh -a -x -o StrictHostKeyChecking=no'; pwd; echo '=== LISTER ALT FRA BRUGER-ROD ==='; ls -la; echo '=== LEDER EFTER SUBDOMÆNER ==='; find -d 2; quit" -u $FTP_USERNAME,$FTP_PASSWORD sftp://ssh.c4ew2s88y.service.one