# ==========================================
# GITHUB ACTIONS – ENDELIG FIX FOR HOVEDSIDE OG SUBDOMÆNER
# ==========================================
name: Complete Deploy to httpd.www and Webroots

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LFTP
        run: sudo apt-get update && sudo apt-get install -y lftp

      # Vi lægger forsiden i /httpd.www/ og subdomænerne i deres webroots
      - name: SFTP Mirror to httpd.www and Webroots
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -e "set sftp:connect-program 'ssh -a -x -o StrictHostKeyChecking=no'; mirror -R --verbose --exclude-glob .git* --exclude-glob .github* --exclude ai/ --exclude cv/ --exclude dashboard/ --exclude data/ ./ /httpd.www/; mirror -R --verbose ./ai/ /webroots/b3f97a47/; mirror -R --verbose ./cv/ /webroots/b5eb7626/; mirror -R --verbose ./dashboard/ /webroots/be5652e7/; mirror -R --verbose ./data/ /webroots/a5402042/; quit" -u $FTP_USERNAME,$FTP_PASSWORD sftp://ssh.c4ew2s88y.service.one