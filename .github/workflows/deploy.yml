# Navnet på denne automatiske arbejdsgang
name: Deploy to One.com

# Kører automatisk, hver gang du trykker på 'Push origin' i GitHub Desktop
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      # Trin 1: Hent din kode fra GitHub-arkivet ind på den virtuelle server
      - name: Checkout code
        uses: actions/checkout@v3

      # Trin 2: Forbind via ægte SFTP og synkroniser filerne
      - name: SFTP Deploy to One.com
        uses: lpress/sftp-deploy-action@v1.1.2
        with:
          # Serveroplysninger
          server: ssh.c4ew2s88y.service.one
          port: 22
          
          # Autentificering fra dine GitHub Secrets
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          
          # Stier
          local_dir: './'      # Tag alt indhold fra din lokale GitHub-mappe
          remote_dir: './www'   # Læg det direkte IND i den eksisterende www-mappe