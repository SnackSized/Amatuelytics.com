      # Automatically swaps the text token placeholder for the secure production string
      - name: Inject Alpha Vantage API Key Secret
        env:
          AV_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: |
          sed -i "s/###ALPHA_VANTAGE_KEY_PLACEHOLDER###/$AV_KEY/g" ./dashboard/stock.php

      # Din eksisterende uændrede LFTP overførsel kører herunder bagefter
      - name: SFTP Mirror to Exact Webroot Silos
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -e "set sftp:connect-program 'ssh -a -x -o StrictHostKeyChecking=no'; mirror -R --verbose --exclude-glob .git* --exclude-glob .github* --exclude ai/ --exclude cv/ --exclude dashboard/ --exclude data/ ./ /webroots/9509701a/; mirror -R --verbose ./ai/ /webroots/b3f97a47/; mirror -R --verbose ./cv/ /webroots/b5eb7626/; mirror -R --verbose ./dashboard/ /webroots/be5652e7/; mirror -R --verbose ./data/ /webroots/a5402042/; quit" -u $FTP_USERNAME,$FTP_PASSWORD sftp://ssh.c4ew2s88y.service.one