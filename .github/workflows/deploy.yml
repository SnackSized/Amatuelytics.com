# Navnet på denne automatiske arbejdsgang på GitHub Actions
name: Deploy to One.com

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LFTP
        run: sudo apt-get update && sudo apt-get install -y lftp

      # Detektiv-trin: Vi lister mapperne i stedet for at uploade
      - name: Debug One.com Directory Structure
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -e "set sftp:connect-program 'ssh -a -x -o StrictHostKeyChecking=no'; ls; quit" -u $FTP_USERNAME,$FTP_PASSWORD sftp://ssh.c4ew2s88y.service.one