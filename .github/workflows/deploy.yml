name: Deploy to One.com

on:
  push:
    branches:
      - main  # <--- Ret til master, hvis din branch hedder master

# ==============================================================================
# DEPLOYMENT DOKUMENTATION - ONE.COM CONFIGURATION
# ==============================================================================
# Host:          ssh.c4ew2s88y.service.one
# Port:          22 (Standard SFTP via SSH)
# 
# DESTINATIONS-MAPPER / SILO-WEBROOTS:
# - Rod-mappe (./)      ->  /webroots/9509701a/  (Ekskluderer ai, avg, cv, dashboard, data, game, .git*)
# - AI Subdomæne        ->  /webroots/b3f97a47/  (./ai/)
# - AVG Subdomæne       ->  /webroots/86066441/  (./avg/)
# - CV Subdomæne        ->  /webroots/b5eb7626/  (./cv/)
# - Dashboard Subdomæne ->  /webroots/be5652e7/  (./dashboard/)
# - Data Subdomæne      ->  /webroots/a5402042/  (./data/)
# - Game Subdomæne      ->  /webroots/2ef87d80/  (./game/)
# ==============================================================================

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # NØDVENDIGT STEP: Installerer lftp på GitHubs midlertidige server, så den genkender kommandoen
      - name: Install lftp
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Inject Alpha Vantage API Key Secret
        env:
          AV_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: |
          sed -i "s/###ALPHA_VANTAGE_KEY_PLACEHOLDER###/$AV_KEY/g" ./dashboard/stock.php


      - name: Inject Eloverblik Secrets (Token & Metering Point)
        env:
          EL_TOKEN: ${{ secrets.ELOVERBLIK_API_TOKEN }}
          EL_METER: ${{ secrets.ELOVERBLIK_METERING_POINT }}
        run: |
          sed -i "s/###ELOVERBLIK_API_TOKEN_PLACEHOLDER###/$EL_TOKEN/g" ./dashboard/electricity.php
          sed -i "s/###ELOVERBLIK_METERING_POINT_PLACEHOLDER###/$EL_METER/g" ./dashboard/electricity.php


      # SIKRING: Opretter mapperne lokalt hvis de mangler i Git, så lftp ikke crasher
      - name: Ensure subfolders exist
        run: mkdir -p ai avg cv dashboard data game

      - name: SFTP Mirror to Exact Webroot Silos
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: lftp -e "set sftp:connect-program 'ssh -a -x -o StrictHostKeyChecking=no'; mirror -R --verbose --exclude-glob .git* --exclude-glob .github* --exclude ai/ --exclude avg/ --exclude cv/ --exclude dashboard/ --exclude data/ --exclude game/ ./ /webroots/9509701a/; mirror -R --verbose ./ai/ /webroots/b3f97a47/; mirror -R --verbose ./avg/ /webroots/86066441/; mirror -R --verbose ./cv/ /webroots/b5eb7626/; mirror -R --verbose ./dashboard/ /webroots/be5652e7/; mirror -R --verbose ./data/ /webroots/a5402042/; mirror -R --verbose ./game/ /webroots/2ef87d80/; quit" -u $FTP_USERNAME,$FTP_PASSWORD sftp://ssh.c4ew2s88y.service.one