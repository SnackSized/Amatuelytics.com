name: Deploy to One.com

# Udløser workflowet automatisk hver gang du pusher til din hoved-branch
on:
  push:
    branches:
      - main  # <--- Ret til master, hvis din branch hedder master

# ==============================================================================
# DEPLOYMENT DOKUMENTATION - ONE.COM CONFIGURATION
# ==============================================================================
# Host:         ssh.c4ew2s88y.service.one
# Port:         22 (Standard SFTP via SSH)
# 
# DESTINATIONS-MAPPER / SILO-WEBROOTS:
# - Rod-mappe (./)      ->  /webroots/9509701a/  (Ekskluderer ai, cv, dashboard, data, .git*)
# - AI Subdomæne        ->  /webroots/b3f97a47/  (./ai/)
# - CV Subdomæne        ->  /webroots/b5eb7626/  (./cv/)
# - Dashboard Subdomæne ->  /webroots/be5652e7/  (./dashboard/)
# - Data Subdomæne      ->  /webroots/a5402042/  (./data/)
# ==============================================================================

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Henter din kode ud på GitHubs server, så vi kan arbejde med den
      - name: Checkout repository
        uses: actions/checkout@v4

      # Swapper din placeholder ud med din rigtige API-nøgle i stock.php
      - name: Inject Alpha Vantage API Key Secret
        env:
          AV_KEY: ${{ secrets.ALPHA_VANTAGE_KEY }}
        run: |
          sed -i "s/###ALPHA_VANTAGE_KEY_PLACEHOLDER###/$AV_KEY/g" ./dashboard/stock.php

      # Spejler filerne over til de korrekte silo-mapper hos one.com
      - name: SFTP Mirror to Exact Webroot Silos
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -e "set sftp:connect-program 'ssh -a -x -o StrictHostKeyChecking=no'; mirror -R --verbose --exclude-glob .git* --exclude-glob .github* --exclude ai/ --exclude cv/ --exclude dashboard/ --exclude data/ ./ /webroots/9509701a/; mirror -R --verbose ./ai/ /webroots/b3f97a47/; mirror -R --verbose ./cv/ /webroots/b5eb7626/; mirror -R --verbose ./dashboard/ /webroots/be5652e7/; mirror -R --verbose ./data/ /webroots/a5402042/; quit" -u $FTP_USERNAME,$FTP_PASSWORD sftp://ssh.c4ew2s88y.service.one