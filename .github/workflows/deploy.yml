# ==========================================
# GITHUB ACTIONS – UNDERSØG WEBROOTS-LINKET
# ==========================================
name: Deep Scan of Webroots Link

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LFTP
        run: sudo apt-get update && sudo apt-get install -y lftp

      # Vi tvinger lftp til at gå ind i 'webroots' mappen og lister ALT derinde i to niveauer
      - name: Scan Inside Webroots
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -e "set sftp:connect-program 'ssh -a -x -o StrictHostKeyChecking=no'; echo '=== INDHOLD AF WEBROOTS ==='; find -d 2 ./webroots; quit" -u $FTP_USERNAME,$FTP_PASSWORD sftp://ssh.c4ew2s88y.service.one