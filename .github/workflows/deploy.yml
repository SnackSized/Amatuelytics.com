# Navnet på denne automatiske arbejdsgang på GitHub Actions
name: Deploy to One.com

# Kører automatisk, hver gang du trykker på 'Push origin' i GitHub Desktop
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest # Starter en standard virtuel Linux-server hos GitHub
    
    steps:
      # Trin 1: Hent dine filer fra GitHub ind på den virtuelle server
      - name: Checkout code
        uses: actions/checkout@v3

      # Trin 2: Installer lftp (standard Linux-værktøj til filoverførsel)
      - name: Install LFTP
        run: sudo apt-get update && sudo apt-get install -y lftp

      # Trin 3: Forbind og synkroniser filerne direkte til One.com via rå SFTP
      - name: SFTP Mirror to One.com
        env:
          # Henter dine hemmelige koder fra GitHub Secrets
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |