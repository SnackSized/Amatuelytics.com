# ==========================================
# GITHUB ACTIONS – AUTOMATISK DEPLOY TIL ONE.COM
# ==========================================
# Dette script kører fuldstændig automatisk i skyen hos GitHub,
# hver gang du trykker på 'Push origin' i GitHub Desktop.

name: Deploy to One.com via Webroots

# Scriptet lytter kun på ændringer, der pushes til din primære 'main' branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. HENTER KODEN FRA GITHUB
      # Henter alle dine filer og mapper fra dit GitHub-arkiv ind på den midlertidige server
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. INSTALLERER SFTP-KLIENTEN (LFTP)
      # One.com kræver en sikker SFTP-forbindelse. Vi installerer værktøjet 'lftp' til opgaven.
      - name: Install LFTP
        run: sudo apt-get update && sudo apt-get install -y lftp

      # 3. OPRYDNING AF GAMMELT ROD & SYNKRONISERING AF NYE FILER
      # Vi logger ind på One.com på én enkelt uafbrudt linje. Den sletter først det gamle 
      # rod i den forkerte rodmappe og overfører bagefter alt til den rigtige 'webroots'-sti.
      - name: Cleanup & Mirror to Real Webroot
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -e "set sftp:connect-program 'ssh -a -x -o StrictHostKeyChecking=no'; rm -f ./index.html ./favicon.svg ./README.md ./.DS_Store ./.gitattributes; rm -rf ./ai ./cv ./dashboard ./data ./amateulytics.com; mirror -R --verbose ./ ./webroots/amateulytics.com/files/; quit" -u $FTP_USERNAME,$FTP_PASSWORD sftp://ssh.c4ew2s88y.service.one