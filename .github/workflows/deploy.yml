# ==========================================
# GITHUB ACTIONS – AUTOMATISK DEPLOY TIL ONE.COM
# ==========================================
name: Clean Deploy to Domain Root

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LFTP
        run: sudo apt-get update && sudo apt-get install -y lftp

      # Vi uploader direkte til den absolutte rod (./) uden om undermapper.
      # Vi bruger --delete, så lftp tvinger serveren til at matche dit GitHub-arkiv 100%.
      - name: SFTP Mirror to Root
        env:
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -e "set sftp:connect-program 'ssh -a -x -o StrictHostKeyChecking=no'; mirror -R --delete --verbose ./ ./; quit" -u $FTP_USERNAME,$FTP_PASSWORD sftp://ssh.c4ew2s88y.service.one