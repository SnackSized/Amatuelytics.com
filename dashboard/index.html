<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Analytics</title>
 <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/latin-modern-webfont@1.0.0/style/latin-modern-roman.min.css">
<style>
  /* ─── THEME ─────────────────────────────────────── */
  :root {
    --bg:       #0d0f0e;
    --surface:  #141716;
    --border:   #1f2421;
    --muted:    #3a3f3c;
    --text:     #e8ede9;
    --dim:      #7a8a7d;
    --green:    #4ade80;
    --red:      #f87171;
    --amber:    #fbbf24;
    --accent:   #a3e635;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    padding: 2rem;
  }

  /* ─── HEADER ─────────────────────────────────────── */
  header {
    display: flex;
    align-items: baseline;
    gap: 1.5rem;
    margin-bottom: 2.5rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.2rem;
  }

  header h1 {
    font-family: 'Fraunces', serif;
    font-weight: 200;
    font-size: 2rem;
    letter-spacing: -0.02em;
    color: var(--text);
  }

  header h1 em {
    font-style: italic;
    color: var(--accent);
  }

  #clock {
    margin-left: auto;
    color: var(--dim);
    font-size: 12px;
    letter-spacing: 0.08em;
  }

  #status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    margin-right: 6px;
    transition: background 0.4s;
  }
  #status-dot.live { background: var(--green); animation: pulse 2s infinite; }
  #status-dot.error { background: var(--red); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ─── SECTION LABELS ─────────────────────────────── */
  .section-label {
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--dim);
    text-transform: uppercase;
    margin-bottom: 0.8rem;
  }

  /* ─── STOCK GRID ─────────────────────────────────── */
  #stocks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 2.5rem;
  }

  .stock-card {
    background: var(--surface);
    padding: 1.2rem 1.4rem;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
    transition: background 0.15s;
    cursor: default;
  }

  .stock-card:hover { background: #191c1a; }

  .stock-ticker {
    font-size: 11px;
    letter-spacing: 0.14em;
    color: var(--dim);
    text-transform: uppercase;
  }

  .stock-name {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 0.95rem;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .stock-price {
    font-size: 1.5rem;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.02em;
    margin-top: 0.3rem;
  }

  .stock-change {
    font-size: 12px;
    font-weight: 400;
  }

  .stock-change.up   { color: var(--green); }
  .stock-change.down { color: var(--red);   }
  .stock-change.flat { color: var(--dim);   }

  .stock-currency {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
  }

  /* ─── ELECTRICITY ─────────────────────────────────── */
  #elec-section { margin-bottom: 2.5rem; }

  #elec-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    margin-bottom: 0.6rem;
  }

  .hour-cell {
    background: var(--surface);
    padding: 0.7rem 0.6rem;
    text-align: center;
    transition: background 0.15s;
  }

  .hour-cell:hover { background: #191c1a; }
  .hour-cell.current-hour { background: #1a2118; outline: 1px solid var(--accent); }

  .hour-label {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }

  .hour-price {
    font-size: 13px;
    font-weight: 500;
  }

  .price-low    { color: var(--green); }
  .price-mid    { color: var(--amber); }
  .price-high   { color: var(--red);  }

  /* ─── CURRENT PRICE SUMMARY ──────────────────────── */
  #elec-summary {
    display: flex;
    gap: 2rem;
    align-items: baseline;
    padding: 0.8rem 1rem;
    border: 1px solid var(--border);
    background: var(--surface);
    font-size: 12px;
    color: var(--dim);
  }

  #elec-summary .big {
    font-family: 'Fraunces', serif;
    font-size: 1.8rem;
    font-weight: 200;
    color: var(--text);
  }

  #elec-summary .unit { font-size: 11px; }

  /* ─── FOOTER ─────────────────────────────────────── */
  footer {
    margin-top: 2rem;
    font-size: 11px;
    color: var(--muted);
    border-top: 1px solid var(--border);
    padding-top: 1rem;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  /* ─── SKELETON ────────────────────────────────────── */
  .skeleton {
    background: linear-gradient(90deg, var(--border) 25%, var(--muted) 50%, var(--border) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 2px;
    display: inline-block;
  }

  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .err { color: var(--red); font-size: 11px; }
</style>
</head>
<body>

<header>
  <h1>Marked<em>soverblik</em></h1>
  <div>
    <span id="status-dot"></span>
    <span id="status-text" style="color:var(--dim);font-size:12px">Indlæser…</span>
  </div>
  <div id="clock"></div>
</header>

<!-- ── STOCKS ───────────────────────────────────────── -->
<div class="section-label">Stonks! &amp; Indeks</div>
<div id="stocks-grid">
  <!-- filled by JS -->
</div>

<!-- ── ELECTRICITY ──────────────────────────────────── -->
<section id="elec-section">
  <div class="section-label">Elctricity Spot — DK1 (Vest) · today · øre/kWh</div>
  <div id="elec-summary">
    <div>
      Nu: <span id="elec-now" class="big">—</span>
      <span class="unit"> øre/kWh</span>
    </div>
    <div>Min: <span id="elec-min" style="color:var(--green)">—</span></div>
    <div>Max: <span id="elec-max" style="color:var(--red)">—</span></div>
    <div>Snit: <span id="elec-avg">—</span></div>
  </div>
  <br>
  <div id="elec-grid"><!-- filled by JS --></div>
  <div id="elec-error" class="err" style="display:none"></div>
</section>

<footer>
  <span>Stocks: Alpha Vantage (free) · El.-data: Energinet via Carnot.dk API</span>
  <span id="last-updated">Last Updated: —</span>
</footer>

<script>
/* ═══════════════════════════════════════════════════════════════════
   KONFIGURATION — tilpas disse værdier efter behov
   ═══════════════════════════════════════════════════════════════════ */
const CONFIG = {

  // ── Aktier ─────────────────────────────────────────────────────
  // Tilføj/fjern tickers herunder. Brug Yahoo Finance-tickersymboler.
  // Eksempler: "AAPL", "NOVO-B.CO", "MSFT", "ORSTED.CO", "^OMXC25"
  stocks: [
    { ticker: "EXIE.DE",      name: "iShares STOXX Europe 600 UCITS ETF (DE) EUR (Acc)" },
    { ticker: "RR.L",      name: "Rolls-Royce Holdings plc" },
    { ticker: "NG=F", name: "Natural Gas" },
    { ticker: "E15H.DE", name: "Amundi Euro Government Inflation-Linked Bond UCITS ETF Dist" },
    { ticker: "^VIX",   name: "CBOE Volatility Index" },
  ],

  // ── Alpha Vantage API-nøgle ────────────────────────────────────
  // Hent din GRATIS nøgle på: https://www.alphavantage.co/support/#api-key
  // Gratis tier: 25 forespørgsler/dag
  alphaVantageKey: "FR3RHUND56FHKJG3",   // ← Key: use secret

  // ── Elspot-zone ────────────────────────────────────────────────
  // "DK1" = Vestdanmark, "DK2" = Østdanmark
  elZone: "DK1",

  // ── Auto-opdatering ────────────────────────────────────────────
  // Intervaller i millisekunder
  stockRefreshMs:  5 * 60 * 1000,   // 5 minutter (gratis API-limit)
  elecRefreshMs:   60 * 60 * 1000,  // 1 time (priser opdateres max 1x/t)
};
/* ═══════════════════════════════════════════════════════════════════ */


/* ── Clock ──────────────────────────────────────────────────────── */
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleDateString('da-DK', { weekday:'short', day:'numeric', month:'short' }) +
    ' · ' + now.toLocaleTimeString('da-DK', { hour:'2-digit', minute:'2-digit' });
}
updateClock();
setInterval(updateClock, 1000);


/* ── Status dot ─────────────────────────────────────────────────── */
function setStatus(state, text) {
  const dot  = document.getElementById('status-dot');
  const span = document.getElementById('status-text');
  dot.className = state; // 'live' | 'error' | ''
  span.textContent = text;
}


/* ══════════════════════════════════════════════════════════════════
   STOCKS — Alpha Vantage GLOBAL_QUOTE endpoint
   Docs: https://www.alphavantage.co/documentation/#latestprice
   ══════════════════════════════════════════════════════════════════ */
function buildStockGrid() {
  const grid = document.getElementById('stocks-grid');
  grid.innerHTML = '';
  CONFIG.stocks.forEach(s => {
    const card = document.createElement('div');
    card.className = 'stock-card';
    card.id = 'card-' + s.ticker.replace(/[^a-z0-9]/gi, '_');
    card.innerHTML = `
      <div class="stock-ticker">${s.ticker}</div>
      <div class="stock-name">${s.name}</div>
      <div class="stock-price"><span class="skeleton" style="width:80px;height:1.4em">&nbsp;</span></div>
      <div class="stock-change flat">—</div>
      <div class="stock-currency"></div>`;
    grid.appendChild(card);
  });
}

async function fetchStock(ticker) {
  const url = `https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol=${encodeURIComponent(ticker)}&apikey=${CONFIG.alphaVantageKey}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('HTTP ' + r.status);
  const d = await r.json();
  const q = d['Global Quote'];
  if (!q || !q['05. price']) throw new Error('Ingen data (API-limit?)');
  return {
    price:   parseFloat(q['05. price']),
    change:  parseFloat(q['09. change']),
    pct:     parseFloat(q['10. change percent']),
    currency: ticker.endsWith('.CO') ? 'DKK' : 'USD',
  };
}

function updateCard(ticker, data) {
  const id   = 'card-' + ticker.replace(/[^a-z0-9]/gi, '_');
  const card = document.getElementById(id);
  if (!card) return;

  const sign   = data.change >= 0 ? '+' : '';
  const cls    = data.change > 0 ? 'up' : data.change < 0 ? 'down' : 'flat';
  const arrow  = data.change > 0 ? '▲' : data.change < 0 ? '▼' : '—';
  const pctStr = isNaN(data.pct) ? '' : ` (${sign}${data.pct.toFixed(2)}%)`;

  card.querySelector('.stock-price').textContent =
    data.price.toLocaleString('da-DK', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const chEl = card.querySelector('.stock-change');
  chEl.className = 'stock-change ' + cls;
  chEl.textContent = `${arrow} ${sign}${data.change.toFixed(2)}${pctStr}`;
  card.querySelector('.stock-currency').textContent = data.currency;
}

async function refreshStocks() {
  setStatus('', 'Opdaterer aktier…');
  let ok = 0;
  for (const s of CONFIG.stocks) {
    try {
      const data = await fetchStock(s.ticker);
      updateCard(s.ticker, data);
      ok++;
    } catch (e) {
      const id   = 'card-' + s.ticker.replace(/[^a-z0-9]/gi, '_');
      const card = document.getElementById(id);
      if (card) {
        card.querySelector('.stock-price').innerHTML = '<span class="err">Fejl</span>';
        card.querySelector('.stock-change').textContent = e.message;
      }
    }
    // Small delay so we don't burst the free API
    await new Promise(res => setTimeout(res, 300));
  }
  if (ok > 0) setStatus('live', 'Live');
  else        setStatus('error', 'API-fejl');
  document.getElementById('last-updated').textContent =
    'Sidst opdateret: ' + new Date().toLocaleTimeString('da-DK');
}


/* ══════════════════════════════════════════════════════════════════
   ELECTRICITY — Carnot.dk (Energinet data)
   Docs: https://www.carnot.dk/api/docs  (gratis, ingen nøgle påkrævet)
   Endpunkt returnerer spotpriser i DKK/MWh → vi konverterer til øre/kWh
   ══════════════════════════════════════════════════════════════════ */
async function refreshElectricity() {
  const errorEl = document.getElementById('elec-error');
  errorEl.style.display = 'none';
  try {
    const today = new Date().toISOString().slice(0, 10);
    const url   = `https://api.carnot.dk/v1/spot?area=${CONFIG.elZone}&date=${today}`;
    const r     = await fetch(url);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data  = await r.json();

    // Carnot returns array of { HourDK, SpotPriceDKK }
    // SpotPriceDKK is DKK per MWh → divide by 10 to get øre/kWh
    const hours = data.map(h => ({
      hour:  new Date(h.HourDK).getHours(),
      price: h.SpotPriceDKK / 10,   // øre/kWh
    }));

    if (!hours.length) throw new Error('Ingen prisdata for i dag endnu');

    const prices  = hours.map(h => h.price);
    const min     = Math.min(...prices);
    const max     = Math.max(...prices);
    const avg     = prices.reduce((a, b) => a + b, 0) / prices.length;
    const curHour = new Date().getHours();
    const curData = hours.find(h => h.hour === curHour);

    document.getElementById('elec-now').textContent =
      curData ? curData.price.toFixed(1) : '—';
    document.getElementById('elec-min').textContent = min.toFixed(1);
    document.getElementById('elec-max').textContent = max.toFixed(1);
    document.getElementById('elec-avg').textContent = avg.toFixed(1);

    const grid = document.getElementById('elec-grid');
    grid.innerHTML = '';
    hours.forEach(h => {
      const cell = document.createElement('div');
      cell.className = 'hour-cell' + (h.hour === curHour ? ' current-hour' : '');
      const pct = (h.price - min) / (max - min || 1);
      const cls = pct < 0.33 ? 'price-low' : pct < 0.67 ? 'price-mid' : 'price-high';
      cell.innerHTML = `
        <div class="hour-label">${String(h.hour).padStart(2,'0')}:00</div>
        <div class="hour-price ${cls}">${h.price.toFixed(1)}</div>`;
      grid.appendChild(cell);
    });

  } catch (e) {
    errorEl.style.display = 'block';
    errorEl.textContent = 'Elfejl: ' + e.message;
  }
}


/* ── Init ────────────────────────────────────────────────────────── */
buildStockGrid();
refreshStocks();
refreshElectricity();

setInterval(refreshStocks,     CONFIG.stockRefreshMs);
setInterval(refreshElectricity, CONFIG.elecRefreshMs);
</script>
</body>
</html>
