<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amateulytics — Under Construction</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/latin-modern-webfont@1.0.0/style/latin-modern-roman.min.css">
<style>
  /* ─── LATEX MONOCHROME THEME ─────────────────────── */
  :root {
    --bg:        #ffffff;
    --text:      #000000;
    --border:    #000000;
    --muted:     #555555;
    --light-grey:#f9f9f9;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Latin Modern Roman", Georgia, serif;
    font-size: 14pt;
    line-height: 1.6;
    max-width: 650px;
    margin: 100px auto;
    padding: 0 20px;
    text-align: center;
  }

  /* ─── LAYOUT & CARD ──────────────────────────────── */
  .construction-container {
    border: 1px dashed var(--border);
    padding: 40px 20px;
    background: var(--light-grey);
    margin-bottom: 3rem;
  }

  h1 {
    font-size: 1.8em;
    font-weight: bold;
    margin-bottom: 20px;
    font-variant: small-caps;
    letter-spacing: 0.5px;
    line-height: 1.3;
  }

  p {
    font-size: 12pt;
    color: var(--muted);
    margin-bottom: 30px;
    font-style: italic;
  }

  .divider {
    border-top: 1px solid var(--border);
    width: 60px;
    margin: 20px auto;
  }

  .code-fallback {
    font-family: monospace;
    font-size: 10pt;
    color: #000;
    background: #eee;
    padding: 4px 8px;
    display: inline-block;
  }

  /* ─── FOOTER ─────────────────────────────────────── */
  footer {
    font-size: 10pt;
    color: var(--muted);
    margin-top: 5rem;
  }
</style>
</head>
<body>

<div class="construction-container">
  <h1>404: Data is gone, but Nulls are also data?</h1>
  
  <div class="divider"></div>
  
  <p>
    This subdomain is currently under construction. The pipeline architecture is deployed, 
    but the tables have yet to be populated.
  </p>
  
  <div class="code-fallback">
    Status: SELECT * FROM pipeline WHERE status = 'PENDING';
  </div>
</div>

<footer>
  <span>Amateulytics Infrastructure Engine v2</span><br>
  <a href="https://amateulytics.com" style="color: var(--text); text-decoration: underline; font-size: 11pt;">Return to main index</a>
</footer>

</body>
</html>
