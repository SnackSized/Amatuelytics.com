<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaTeX Style Hjemmeside</title>
    
    <!-- Her henter vi den ægte Computer Modern font (LaTeX) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/latin-modern-webfont@1.0.0/style/latin-modern-roman.min.css">
    
    <style>
        body {
            /* Aktiverer LaTeX-skriften på hele siden */
            font-family: "Latin Modern Roman", Georgia, serif;
            font-size: 14pt;
            line-height: 1.6;
            color: #000;
            background-color: #fff;
            
            /* Giver de klassiske brede LaTeX-margener */
            max-width: 700px;
            margin: 80px auto;
            padding: 0 20px;
            text-align: justify;
        }

        h1, h2, h3 {
            font-weight: bold;
            /* LaTeX bruger ofte center til hovedtitler */
            text-align: center; 
            margin-top: 40px;
        }

        h1 { font-size: 2.2em; margin-bottom: 5px; }
        
        .author-date {
            text-align: center;
            font-size: 1.1em;
            margin-bottom: 5px;
            color: #333;
        }

        .abstract {
            margin: 40px 60px;
            font-size: 0.95em;
        }

        .abstract-title {
            text-align: center;
            font-weight: bold;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <h1>Amateulytics /ˌæm.ə.tʃʊˈlɪt.ɪks/ (noun)</h1>
    <div class="author-date">June 2026</div>

    <h2>1. Introduction</h2>
    <p>
        If you love beer, data and code and see them as symbiotic - you have found your new home...
    </p>

</body>
</html>
